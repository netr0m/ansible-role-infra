---
repos:
  - repo: local
    hooks:
      - id: yamllint
        name: YAML Lint
        description: Run yamllint
        entry: sh -c "../.venv/bin/yamllint -c .yamllint ."
        language: system

      - id: ansible-lint
        name: Ansible Lint
        description: Run ansible-lint
        entry: sh -c "../.venv/bin/ansible-lint -c .ansible-lint ."
        language: system
...
